name: Publish menu
on:
  workflow_dispatch:
    inputs:
      menu_b64:
        description: 'Base64-encoded menu.json content'
        required: true
        type: string
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write menu.json
        run: |
          node -e "
            const fs = require('fs');
            const json = Buffer.from(process.env.MENU_B64, 'base64').toString('utf-8');
            const menu = JSON.parse(json);
            if (!menu || !Array.isArray(menu.categories)) { console.error('invalid menu'); process.exit(1); }
            fs.writeFileSync('data/menu.json', JSON.stringify(menu, null, 2) + '\n');
          "
        env:
          MENU_B64: ${{ inputs.menu_b64 }}
      - name: Commit and push
        run: |
          git config user.name "luxury-crop-bot"
          git config user.email "actions@github.com"
          git add data/menu.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "تحديث المنيو من لوحة الإدارة"
          git push
